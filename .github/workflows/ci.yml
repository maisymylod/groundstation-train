name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests + harness calibration gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (core + dev; CPU, no ML stack)
        run: pip install -e ".[dev]"
      - name: Tests + quality gate
        # Includes the harness-calibration tests: the eval must score the
        # gate-compliant oracle at 1.0 and the gate-bypass baseline at 0.0.
        run: pytest --cov=groundstation_train --cov-report=term-missing --cov-fail-under=90
      - name: Regenerate dataset + reference eval reports
        run: |
          python -m groundstation_train.data.generate
          python -m groundstation_train.eval.harness --policy gate-compliant --tag gate-compliant-oracle --no-history
          python -m groundstation_train.eval.harness --policy gate-bypass --tag gate-bypass-baseline --no-history
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ops-eval-reports
          path: artifacts/
